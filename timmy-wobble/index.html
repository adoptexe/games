const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 400, H = 711;
canvas.width = W; canvas.height = H;

function resize() {
  const s = Math.min(window.innerWidth/W, window.innerHeight/H);
  canvas.style.width=(W*s)+'px'; canvas.style.height=(H*s)+'px';
}
resize(); window.addEventListener('resize', resize);

// Audio
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new AudioCtx();}
function playSound(freq,dur,type='square'){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,audioCtx.currentTime);
  g.gain.setValueAtTime(0.12,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);
}
function playHeart(){playSound(659,0.08);setTimeout(()=>playSound(880,0.12),70);}
function playKiss(){[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>playSound(f,0.1),i*60));}
function playWobble(){playSound(220,0.15,'triangle');}
function playFall(){[350,280,220,150].forEach((f,i)=>setTimeout(()=>playSound(f,0.2,'sawtooth'),i*150));}
function playCountdown(){playSound(440,0.15);}
function playGo(){playSound(880,0.3);}
function playLevelUp(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playSound(f,0.12),i*80));}

// Images
const images = {};
let loaded = 0;
const total = Object.keys(SPRITES).length;
Object.entries(SPRITES).forEach(([k,src])=>{
  const img=new Image();
  img.onload=()=>{loaded++;if(loaded>=total)startGame();};
  img.src=src; images[k]=img;
});

let state = 'title';
let score=0, highScore=0, distance=0, level=1;
let gameTime=0, difficulty=1;
let shakeX=0,shakeY=0,shakeTime=0;
let flashAlpha=0,flashColor='#fff';
let countdownTimer=0,countdownNum=3;

let balance = 0;
let wobbleDir = 1;
let wobbleSpeed = 0.4;
let isStable = false;
let stableTimer = 0;

let scrollX = 0;
let scrollSpeed = 1.5;

let hearts = [];
let kisses = [];

let particles = [];
let floatingTexts = [];

let heartTrail = [];

}));

  y: 60 + Math.random()*80,

  speed: 0.15 + Math.random()*0.2,

}));

// Input
let inputDir = 0;
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft'||e.key==='a') inputDir=-1;
  if(e.key==='ArrowRight'||e.key==='d') inputDir=1;
  if(state==='title'){initAudio();state='countdown';countdownTimer=0;countdownNum=3;}
  if(state==='gameover'&&e.key===' ') resetGame();
});
document.addEventListener('keyup', e=>{
  if((e.key==='ArrowLeft'||e.key==='a')&&inputDir===-1) inputDir=0;
  if((e.key==='ArrowRight'||e.key==='d')&&inputDir===1) inputDir=0;
});

canvas.addEventListener('touchstart', e=>{
  e.preventDefault(); initAudio();
  if(state==='title'){state='countdown';countdownTimer=0;countdownNum=3;return;}
  if(state==='gameover'){resetGame();return;}
  const r=canvas.getBoundingClientRect();
  const tx=(e.touches[0].clientX-r.left)*(W/r.width);
  inputDir = tx < W/2 ? -1 : 1;
});
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  const tx=(e.touches[0].clientX-r.left)*(W/r.width);
  inputDir = tx < W/2 ? -1 : 1;
});
canvas.addEventListener('touchend', e=>{e.preventDefault();inputDir=0;});
canvas.addEventListener('click', e=>{
  initAudio();
  if(state==='title'){state='countdown';countdownTimer=0;countdownNum=3;}
  if(state==='gameover') resetGame();
});

// Effects
function shake(i=5,d=8){shakeX=i;shakeY=i;shakeTime=d;}
function flash(c='#fff',a=0.3){flashColor=c;flashAlpha=a;}
function addParticles(x,y,color,count,spread=6){
  for(let i=0;i<count;i++) particles.push({
    x,y,vx:(Math.random()-0.5)*spread,vy:(Math.random()-0.5)*spread-3,
    size:Math.random()*4+2,color,life:1,type:Math.random()>0.5?'square':'circle'
  });
}
function addSparkle(x,y,color='#FFD700'){
  for(let i=0;i<4;i++) sparkles.push({
    x:x+(Math.random()-0.5)*30,y:y+(Math.random()-0.5)*30,
    size:Math.random()*5+3,life:1,color
  });
}
function addFloatingText(x,y,text,color,size=12){
  floatingTexts.push({x,y,text,color,life:1,vy:-2.5,size,scale:1.5});
}

// Spawning
function spawnHeart(){
  hearts.push({
    x:W+Math.random()*100, y:H-155-Math.random()*25,
    size:24, collected:false, bobPhase:Math.random()*Math.PI*2
  });
}
function spawnKiss(){
  kisses.push({
    x:W+Math.random()*100, y:H-160-Math.random()*20,
    size:28, collected:false, bobPhase:Math.random()*Math.PI*2
  });
}

function resetGame(){
  score=0;distance=0;level=1;gameTime=0;difficulty=1;
  balance=0;wobbleDir=1;wobbleSpeed=0.4;
  isStable=false;stableTimer=0;scrollSpeed=1.5;
  hearts=[];kisses=[];particles=[];floatingTexts=[];sparkles=[];heartTrail=[];
  spawnTimer=0;
  state='countdown';countdownTimer=0;countdownNum=3;
}

// Update
function update(){
  if(shakeTime>0){shakeTime--;shakeX*=0.8;shakeY*=0.8;}else{shakeX=0;shakeY=0;}
  if(flashAlpha>0) flashAlpha-=0.03;
  sparkles.forEach(s=>{s.life-=0.03;s.size*=0.97;});
  sparkles=sparkles.filter(s=>s.life>0);

  if(state==='countdown'){
    countdownTimer++;
    if(countdownTimer%40===0){
      countdownNum--;
      if(countdownNum>0) playCountdown();
      else{playGo();state='playing';}
    }
    return;
  }
  if(state!=='playing') return;

  gameTime++;
  distance+=scrollSpeed;
  score=Math.floor(distance/10);
  difficulty=1+gameTime/2000;

  const newLevel=Math.floor(score/500)+1;
  if(newLevel>level){
    level=newLevel;
    flash('#ff69b4',0.3);shake(8,12);
    addFloatingText(W/2,H/2-80,`LEVEL ${level}!`,'#FFD700',18);
    playLevelUp();
    scrollSpeed=Math.min(4,1.5+level*0.3);
    wobbleSpeed=Math.min(1.2,0.4+level*0.08);
  }

  scrollX+=scrollSpeed;

  // Wobble physics
  if(isStable){
    stableTimer--;
    if(stableTimer<=0) isStable=false;
    balance*=0.9;
  } else {
    if(Math.random()<0.02*difficulty) wobbleDir*=-1;
    balance+=wobbleDir*wobbleSpeed*difficulty;
    if(Math.random()<0.005*difficulty){
      balance+=(Math.random()-0.5)*20;
      playWobble();
    }
  }

  // Player correction
  if(inputDir!==0){
    balance-=inputDir*1.8;
    if(gameTime%5===0){
      const side=inputDir===-1?W/2+30:W/2-30;
      particles.push({x:side,y:H-140,vx:inputDir*2,vy:-1,size:3,color:'#ff69b4',life:0.5,type:'circle'});
    }
  }

  // Fall check
  if(Math.abs(balance)>100){
    if(score>highScore) highScore=score;
    playFall();shake(12,20);flash('#ff4444',0.4);
    addParticles(W/2,H-140,'#ff4444',20,10);
    state='gameover';
    return;
  }

  // Spawn collectibles
  spawnTimer++;
  if(spawnTimer%50===0) spawnHeart();
  if(spawnTimer%250===0) spawnKiss();

  // Hearts
  hearts.forEach(h=>{
    h.x-=scrollSpeed;
    h.bobPhase+=0.05;
    const by=Math.sin(h.bobPhase)*8;
    if(!h.collected&&Math.abs(h.x-W/2)<35&&Math.abs((h.y+by)-(H-150))<40){
      h.collected=true;score+=50;
      addParticles(h.x,h.y+by,'#ff69b4',10,8);
      addSparkle(h.x,h.y+by,'#ff69b4');
      addFloatingText(h.x,h.y+by-20,'+50','#ff69b4',14);
      playHeart();balance*=0.7;
    }
  });

  // Kisses
  kisses.forEach(k=>{
    k.x-=scrollSpeed;
    k.bobPhase+=0.04;
    const by=Math.sin(k.bobPhase)*6;
    if(!k.collected&&Math.abs(k.x-W/2)<35&&Math.abs((k.y+by)-(H-150))<40){
      k.collected=true;isStable=true;stableTimer=180;balance*=0.3;
      addParticles(k.x,k.y+by,'#FFD700',15,10);
      addParticles(k.x,k.y+by,'#ff69b4',10,8);
      addSparkle(k.x,k.y+by,'#FFD700');
      addFloatingText(k.x,k.y+by-20,'KISS POWER!','#FFD700',14);
      flash('#ff69b4',0.2);shake(5,8);playKiss();
    }
  });

  // Cleanup
  hearts=hearts.filter(h=>h.x>-50&&!h.collected);
  kisses=kisses.filter(k=>k.x>-50&&!k.collected);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life-=0.025;});
  particles=particles.filter(p=>p.life>0);
  floatingTexts.forEach(t=>{t.y+=t.vy;t.life-=0.018;t.scale=Math.max(1,t.scale-0.05);});
  floatingTexts=floatingTexts.filter(t=>t.life>0);

  if(isStable&&gameTime%3===0){
    heartTrail.push({x:W/2+(Math.random()-0.5)*40,y:H-120,life:1,size:8+Math.random()*6});
  }
  heartTrail.forEach(h=>{h.y-=1.5;h.life-=0.02;h.size*=0.98;});
  heartTrail=heartTrail.filter(h=>h.life>0);
}

// Draw functions
function drawStars(){
  const t=Date.now()/1000;
  stars.forEach(s=>{
    const a=0.2+Math.sin(t*1.5+s.twinkle)*0.3;
    ctx.globalAlpha=a;ctx.fillStyle=s.color;
    if(s.size>2){ctx.fillRect(s.x-s.size/2,s.y-0.5,s.size,1);ctx.fillRect(s.x-0.5,s.y-s.size/2,1,s.size);}
    else ctx.fillRect(s.x,s.y,s.size,s.size);
  });ctx.globalAlpha=1;
}

function drawClouds(){
  clouds.forEach(c=>{
    c.x+=c.speed;
    if(c.x>W+c.w) c.x=-c.w;
    ctx.globalAlpha=c.opacity;
    ctx.fillStyle='#aabbcc';
    // Main body
    ctx.beginPath();ctx.ellipse(c.x,c.y,c.w/2,c.h/2,0,0,Math.PI*2);ctx.fill();
    // Left puff
    ctx.beginPath();ctx.ellipse(c.x-c.w/3,c.y+2,c.w/4,c.h/3,0,0,Math.PI*2);ctx.fill();
    // Right puff
    ctx.beginPath();ctx.ellipse(c.x+c.w/3,c.y+2,c.w/3.5,c.h/3,0,0,Math.PI*2);ctx.fill();
    // Top puff
    ctx.beginPath();ctx.ellipse(c.x+c.w/8,c.y-c.h/3,c.w/4,c.h/3,0,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawPath(){
  ctx.fillStyle='#1a3a1a';ctx.fillRect(0,H-90,W,90);
  ctx.strokeStyle='#2a5a2a';ctx.lineWidth=2;ctx.setLineDash([15,15]);
  ctx.beginPath();ctx.moveTo(0,H-60);ctx.lineTo(W,H-60);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#2a6a2a';ctx.fillRect(0,H-92,W,4);

  for(let i=0;i<15;i++){
    const gx=((i*35-scrollX*0.8)%W+W)%W;
    ctx.fillStyle='#3a7a3a';ctx.fillRect(gx,H-96,6,6);ctx.fillRect(gx+2,H-100,2,4);
  }
  for(let i=0;i<8;i++){
    const fx=((i*55+20-scrollX*0.6)%W+W)%W;
    ctx.fillStyle='#3a6a2a';ctx.fillRect(fx,H-100,2,10);
    ctx.fillStyle=['#FFD700','#ff69b4','#ff6644','#cc44ff'][i%4];
    ctx.beginPath();ctx.arc(fx+1,H-102,3,0,Math.PI*2);ctx.fill();
  }
}

function drawDangerVignette(){
  const danger = Math.abs(balance)/100;
  if(danger < 0.4) return;
  const alpha = (danger-0.4)/0.6*0.6;
  const pulse = Math.sin(Date.now()/150)*0.15;

  const leftGrad = ctx.createLinearGradient(0,0,120,0);
  leftGrad.addColorStop(0, `rgba(255,0,0,${(alpha+pulse)*(balance<0?1.5:0.5)})`);
  leftGrad.addColorStop(1, 'rgba(255,0,0,0)');
  ctx.fillStyle=leftGrad;ctx.fillRect(0,0,120,H);

  const rightGrad = ctx.createLinearGradient(W,0,W-120,0);
  rightGrad.addColorStop(0, `rgba(255,0,0,${(alpha+pulse)*(balance>0?1.5:0.5)})`);
  rightGrad.addColorStop(1, 'rgba(255,0,0,0)');
  ctx.fillStyle=rightGrad;ctx.fillRect(W-120,0,120,H);
}

function drawBalanceOnTimmy(){
  const px=W/2, py=H-72;
  const danger=Math.abs(balance)/100;
  const radius=40;

  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=4;
  ctx.beginPath();ctx.arc(px,py,radius,Math.PI,0);ctx.stroke();

  const color=isStable?'#FFD700':danger>0.7?'#ff2222':danger>0.4?'#ffaa22':'#44ff44';
  ctx.strokeStyle=color;ctx.lineWidth=6;
  ctx.shadowColor=color;ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(px,py,radius,Math.PI,0);ctx.stroke();
  ctx.shadowBlur=0;

  // Center marker
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.fillRect(px-1,py-radius-4,2,8);

  const needleAngle=Math.PI/2 - (balance/100)*Math.PI/2;
  const nx=px+Math.cos(needleAngle)*(radius-5);
  const ny=py-Math.sin(needleAngle)*(radius-5);

  ctx.strokeStyle='#fff';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(nx,ny);ctx.stroke();

  ctx.fillStyle=color;ctx.beginPath();ctx.arc(nx,ny,6,0,Math.PI*2);ctx.fill();
  
  // Center dot
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);ctx.fill();

  if(isStable){
    ctx.fillStyle='#FFD700';ctx.font='8px "Press Start 2P"';ctx.textAlign='center';
    ctx.fillText('💋 STABLE',px,py+18);
  }
}

function drawPlayer(){
  ctx.save();
  const tilt=balance/100*0.4;
  const ab=Math.abs(balance);

  let sprite;
  if(isStable) sprite=images.sit;
  else if(ab<20) sprite=images.sit;
  else if(balance<-50) sprite=images.leanL;
  else if(balance>50) sprite=images.leanR;
  else if(balance<-20) sprite=images.wobbleL;
  else sprite=images.wobbleR;

  const px=W/2, py=H-150;
  const bob=Math.sin(gameTime*0.1)*3;

  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(px,H-88,30+ab*0.15,7,0,0,Math.PI*2);ctx.fill();

  if(isStable){
    ctx.shadowColor='rgba(255,215,0,0.6)';ctx.shadowBlur=25+Math.sin(Date.now()/100)*10;
  } else if(ab>70){
    const pulseSpeed=100+(100-ab)*5;
    const gi=(ab-70)/30;
    ctx.shadowColor=`rgba(255,0,0,${0.3+gi*0.4+Math.sin(Date.now()/pulseSpeed)*0.2})`;
    ctx.shadowBlur=15+gi*15;
  } else if(ab>40){
    ctx.shadowColor='rgba(255,170,0,0.3)';ctx.shadowBlur=10;
  }

  ctx.translate(px,py+bob);ctx.rotate(tilt);
  ctx.drawImage(sprite,-55,-65,110,130);
  ctx.shadowBlur=0;ctx.restore();
}

function drawHearts(){
  hearts.forEach(h=>{
    if(h.collected) return;
    const by=Math.sin(h.bobPhase)*8;
    ctx.fillStyle='#ff69b4';ctx.font=`${h.size}px serif`;ctx.textAlign='center';
    ctx.fillText('♥',h.x,h.y+by);
    ctx.globalAlpha=0.4;ctx.shadowColor='#ff69b4';ctx.shadowBlur=10;
    ctx.fillText('♥',h.x,h.y+by);
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  });
}

function drawKisses(){
  kisses.forEach(k=>{
    if(k.collected) return;
    const by=Math.sin(k.bobPhase)*6;
    ctx.font=`${k.size}px serif`;ctx.textAlign='center';
    ctx.fillText('💋',k.x,k.y+by);
    ctx.globalAlpha=0.3+Math.sin(Date.now()/200)*0.2;
    ctx.fillStyle='#FFD700';
    ctx.fillRect(k.x-2+Math.sin(Date.now()/300)*8,k.y+by-10,4,4);
    ctx.globalAlpha=1;
  });
}

function drawHeartTrail(){
  heartTrail.forEach(h=>{
    ctx.globalAlpha=h.life*0.6;ctx.fillStyle='#ff69b4';
    ctx.font=`${h.size}px serif`;ctx.textAlign='center';
    ctx.fillText('♥',h.x,h.y);
  });ctx.globalAlpha=1;
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
    if(p.type==='circle'){ctx.beginPath();ctx.arc(p.x,p.y,p.size/2,0,Math.PI*2);ctx.fill();}
    else ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  });ctx.globalAlpha=1;
}

function drawSparkles(){
  sparkles.forEach(s=>{
    ctx.globalAlpha=s.life;ctx.fillStyle=s.color;
    ctx.fillRect(s.x-s.size/2,s.y-1,s.size,2);
    ctx.fillRect(s.x-1,s.y-s.size/2,2,s.size);
  });ctx.globalAlpha=1;
}

function drawFloatingTexts(){
  floatingTexts.forEach(t=>{
    ctx.save();ctx.globalAlpha=t.life;ctx.fillStyle=t.color;
    ctx.font=`${t.size}px "Press Start 2P"`;ctx.textAlign='center';
    ctx.translate(t.x,t.y);ctx.scale(t.scale,t.scale);
    ctx.strokeStyle='rgba(0,0,0,0.8)';ctx.lineWidth=3;
    ctx.strokeText(t.text,0,0);ctx.fillText(t.text,0,0);
    ctx.restore();
  });
}

function drawFlash(){
  if(flashAlpha<=0)return;
  ctx.fillStyle=flashColor;ctx.globalAlpha=flashAlpha;
  ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
}

function drawHUD(){
  ctx.fillStyle='rgba(10,0,18,0.7)';ctx.fillRect(5,5,115,50);
  ctx.strokeStyle='#ff8844';ctx.lineWidth=1;ctx.strokeRect(5,5,115,50);
  ctx.fillStyle='#ffaa66';ctx.font='8px "Press Start 2P"';ctx.textAlign='left';
  ctx.fillText('SCORE',15,22);
  ctx.fillStyle='#FFD700';ctx.font='14px "Press Start 2P"';
  ctx.fillText(`${score}`,15,42);

  ctx.fillStyle='rgba(10,0,18,0.7)';ctx.fillRect(W/2-30,5,60,20);
  ctx.strokeStyle='#ff69b4';ctx.strokeRect(W/2-30,5,60,20);
  ctx.fillStyle='#ff69b4';ctx.font='8px "Press Start 2P"';ctx.textAlign='center';
  ctx.fillText(`LV.${level}`,W/2,19);

  ctx.fillStyle='rgba(10,0,18,0.7)';ctx.fillRect(W-95,5,90,25);
  ctx.strokeStyle='#ff8844';ctx.strokeRect(W-95,5,90,25);
  ctx.fillStyle='#ffaa66';ctx.font='7px "Press Start 2P"';ctx.textAlign='right';
  ctx.fillText(`${Math.floor(distance)}m`,W-10,20);


}

// Screens
function drawTitle(){
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0a0012');bg.addColorStop(0.6,'#1a0820');bg.addColorStop(1,'#1a3a1a');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  drawStars(); drawClouds(); drawPath();

  ctx.fillStyle='rgba(10,0,18,0.88)';ctx.fillRect(30,120,W-60,370);
  ctx.strokeStyle='#ff8844';ctx.lineWidth=2;ctx.strokeRect(30,120,W-60,370);
  ctx.strokeStyle='#ff69b4';ctx.strokeRect(33,123,W-66,364);

  ctx.textAlign='center';
  ctx.fillStyle='#ff69b4';ctx.font='16px "Press Start 2P"';
  ctx.fillText("TIMMY'S",W/2,170);
  ctx.fillStyle='#FFD700';ctx.font='24px "Press Start 2P"';
  ctx.fillText('WOBBLE',W/2,205);
  ctx.fillText('WALK',W/2,240);

  if(images.sit) ctx.drawImage(images.sit,W/2-50,255,100,120);

  ctx.fillStyle='#cc88ff';ctx.font='9px "Press Start 2P"';
  ctx.fillText('Keep Timmy balanced!',W/2,400);
  ctx.fillStyle='#ff69b4';ctx.font='9px "Press Start 2P"';
  ctx.fillText('♥ = +50pts + balance',W/2,425);
  ctx.fillText('💋 = 3s stability',W/2,448);
  ctx.fillStyle='#8866aa';ctx.font='8px "Press Start 2P"';
  ctx.fillText('Tap left/right to correct',W/2,471);

  if(Math.floor(Date.now()/500)%2){
    ctx.fillStyle='#ff69b4';ctx.font='14px "Press Start 2P"';
    ctx.fillText('TAP TO START',W/2,540);
  }
  if(highScore>0){ctx.fillStyle='#FFD700';ctx.font='9px "Press Start 2P"';ctx.fillText(`BEST: ${highScore}`,W/2,575);}
  ctx.fillStyle='#ff8844';ctx.font='11px "Press Start 2P"';ctx.fillText('adopt.exe',W/2,H-25);
}

function drawCountdown(){
  drawGame();
  ctx.fillStyle='rgba(10,0,18,0.7)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  if(countdownNum>0){
    ctx.fillStyle='#ff69b4';ctx.font='60px "Press Start 2P"';
    const sc=1+Math.sin(countdownTimer%40/40*Math.PI)*0.3;
    ctx.save();ctx.translate(W/2,H/2);ctx.scale(sc,sc);
    ctx.fillText(`${countdownNum}`,0,20);ctx.restore();
  } else {
    ctx.fillStyle='#FFD700';ctx.font='32px "Press Start 2P"';
    ctx.fillText('WALK!',W/2,H/2+15);
  }
}

function drawGameOver(){
  ctx.fillStyle='rgba(10,0,18,0.9)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(20,5,35,0.95)';ctx.fillRect(30,80,W-60,530);
  ctx.strokeStyle='#ff69b4';ctx.lineWidth=2;ctx.strokeRect(30,80,W-60,530);
  ctx.strokeStyle='#ff8844';ctx.strokeRect(33,83,W-66,524);

  ctx.textAlign='center';
  ctx.fillStyle='#ff69b4';ctx.font='18px "Press Start 2P"';
  ctx.fillText('TIMMY FELL!',W/2,130);

  const fallSprite=balance>0?images.leanR:images.leanL;
  if(fallSprite){
    ctx.save();ctx.translate(W/2,230);
    ctx.rotate(balance>0?0.5:-0.5);
    ctx.drawImage(fallSprite,-50,-60,100,120);ctx.restore();
  }

  ctx.fillStyle='#cc88ff';ctx.font='10px "Press Start 2P"';ctx.fillText('FINAL SCORE',W/2,310);
  ctx.fillStyle='#FFD700';ctx.font='28px "Press Start 2P"';ctx.fillText(`${score}`,W/2,350);
  if(score>=highScore&&score>0){
    ctx.fillStyle='#ff69b4';ctx.font='10px "Press Start 2P"';
    if(Math.floor(Date.now()/300)%2) ctx.fillText('★ NEW RECORD ★',W/2,375);
  }

  ctx.fillStyle='#8866aa';ctx.font='9px "Press Start 2P"';
  ctx.fillText(`DISTANCE: ${Math.floor(distance)}m`,W/2,410);
  ctx.fillText(`LEVEL: ${level}`,W/2,435);

  ctx.fillStyle='rgba(68,255,68,0.1)';ctx.fillRect(50,460,W-100,50);
  ctx.strokeStyle='#44ff44';ctx.strokeRect(50,460,W-100,50);
  ctx.fillStyle='#44ff44';ctx.font='10px "Press Start 2P"';ctx.fillText('ADOPT TIMMY',W/2,482);
  ctx.fillStyle='#88cc88';ctx.font='8px "Press Start 2P"';ctx.fillText('DM @adopt.exe_',W/2,500);

  if(Math.floor(Date.now()/500)%2){
    ctx.fillStyle='#ff69b4';ctx.font='12px "Press Start 2P"';ctx.fillText('TAP TO RETRY',W/2,555);
  }
  ctx.fillStyle='#ff8844';ctx.font='11px "Press Start 2P"';ctx.fillText('adopt.exe',W/2,H-25);
}

function drawGame(){
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#050010');bg.addColorStop(0.5,'#120820');bg.addColorStop(0.85,'#0d1a12');bg.addColorStop(1,'#1a3a1a');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  drawStars();
  drawClouds();
  drawPath();
  drawHearts();
  drawKisses();
  drawHeartTrail();
  drawPlayer();
  drawBalanceOnTimmy();
  drawParticles();
  drawSparkles();
  drawFloatingTexts();
  drawDangerVignette();
  drawFlash();
  drawHUD();
}

// Loop
function gameLoop(){
  update();
  ctx.save();
  if(shakeTime>0) ctx.translate((Math.random()-0.5)*shakeX*2,(Math.random()-0.5)*shakeY*2);
  switch(state){
    case'title':drawTitle();break;
    case'countdown':drawCountdown();break;
    case'playing':drawGame();break;
    case'gameover':drawGame();drawGameOver();break;
  }
  ctx.restore();
  requestAnimationFrame(gameLoop);
}

function startGame(){gameLoop();}
</script>
</body>
</html>
