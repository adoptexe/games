const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 400, H = 711;
canvas.width = W; canvas.height = H;

function resize() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width = (W * s) + 'px';
  canvas.style.height = (H * s) + 'px';
}
resize();
window.addEventListener('resize', resize);

// =====================================================
//  AUDIO ENGINE
// =====================================================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function initAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function playTone(freq, dur, type = 'square', vol = 0.1) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

  combo: () => { playTone(880,.05); setTimeout(()=>playTone(1100,.08),40); },

  bossHit: () => { playTone(300,.05); setTimeout(()=>playTone(400,.05),30); setTimeout(()=>playTone(600,.08),60); },
  bossDead: () => { [261,329,392,523,659,784,1047].forEach((f,i) => setTimeout(()=>playTone(f,.15,'sine',.1), i*80)); },
  levelUp: () => { [523,659,784,1047].forEach((f,i) => setTimeout(()=>playTone(f,.12),i*100)); },
  bomb: () => { playTone(80,.4,'sawtooth',.15); setTimeout(()=>playTone(60,.3,'sawtooth',.1),100); },
  life: () => { [659,784,1047,1319].forEach((f,i) => setTimeout(()=>playTone(f,.15,'sine',.12),i*80)); },
};

function createSprite(pixels, colors, scale = 2) {
  const h = pixels.length, w = pixels[0].length;
  const c = document.createElement('canvas');
  c.width = w * scale; c.height = h * scale;
  const cx = c.getContext('2d');
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const ci = parseInt(pixels[y][x]);
      if (!isNaN(ci) && colors[ci]) {
        cx.fillStyle = colors[ci];
        cx.fillRect(x * scale, y * scale, scale, scale);
      }
    }
  }
  return c;
}

let state = 'title';
let score = 0, highScore = 0;
try { highScore = parseInt(localStorage.getItem('kh_hi') || '0'); } catch(e) {}
let lives = 3, maxLives = 5;
let combo = 0, maxCombo = 0, comboTimer = 0;
let level = 1, levelTimer = 0;
let gameTime = 0;
let shakeX = 0, shakeY = 0, shakeDur = 0;

// Player
const player = {
  x: W / 2, y: H - 80, groundY: H - 80,
  w: 46, h: 64,
  speed: 0, maxSpeed: 6, accel: 0.5, friction: 0.85,
  dashCooldown: 0, dashing: false,

};

// Active power-ups
let activePowerups = { magnet: 0, slow: 0, frenzy: 0 };

// Collections
let prey = [], powerups = [], particles = [], floatTexts = [], trails = [];
let boss = null, bossWarning = 0;

// Stars
const stars = Array.from({length: 80}, () => ({
  x: Math.random() * W, y: Math.random() * H,
  s: Math.random() * 2 + 0.5, speed: Math.random() * 0.3 + 0.1,
  blink: Math.random() * Math.PI * 2,
}));

// Spawn timers
let spawnTimer = 0, powerupTimer = 0, bossTimer = 0;

// Input
let keys = {}, touchX = null, touchStartX = null, touchStartTime = 0;
let lastTapTime = 0, lastTapDir = 0;

// =====================================================
//  INPUT
// =====================================================
window.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowUp') {
    e.preventDefault();
    if (state === 'title') { startGame(); return; }
    if (state === 'gameover') { resetGame(); return; }
    if (state === 'playing' && player.dashCooldown <= 0 && !player.dashing) {
      triggerDash();
    }
  }
  keys[e.key] = true;
  initAudio();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

let touchMoved = false;
canvas.addEventListener('touchstart', e => {
  e.preventDefault(); initAudio();
  if (state === 'title') { startGame(); return; }
  if (state === 'gameover') { resetGame(); return; }
  const t = e.touches[0], rect = canvas.getBoundingClientRect();
  touchX = (t.clientX - rect.left) / rect.width * W;
  touchStartX = touchX;
  touchStartTime = Date.now();
  touchMoved = false;
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0], rect = canvas.getBoundingClientRect();
  touchX = (t.clientX - rect.left) / rect.width * W;
  if (Math.abs(touchX - touchStartX) > 15) touchMoved = true;
});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const dt = Date.now() - touchStartTime;
  // Quick tap without much movement = jump
  if (!touchMoved && dt < 250 && state === 'playing' && player.dashCooldown <= 0 && !player.dashing) {
    triggerDash();
  }
  touchX = null; touchStartX = null; touchMoved = false;
});
canvas.addEventListener('click', e => {
  initAudio();
  if (state === 'title') startGame();
  else if (state === 'gameover') resetGame();
});

function triggerDash() {
  player.dashing = true;
  player.vy = -14; // Launch upward
  player.dashCooldown = 45;
  SFX.dash();
  // Trail particles at feet
  for (let i = 0; i < 8; i++) {
    particles.push({
      x: player.x + (Math.random() - 0.5) * 30,
      y: player.groundY + 10,
      vx: (Math.random() - 0.5) * 3,
      vy: Math.random() * 2,
      color: '#ff69b4',
      size: 2 + Math.random() * 3,
      life: 15 + Math.random() * 10,
      maxLife: 25, alpha: 1, gravity: 0.05,
    });
  }
}

let missCount = 0;

// =====================================================
//  SPAWNING
// =====================================================
function getSpawnRate() { return Math.max(20, 60 - level * 3); }
function getPreySpeed() {
  const base = 1.5 + level * 0.2;
  return activePowerups.slow > 0 ? base * 0.4 : base;
}

function spawnPrey() {
  const r = Math.random(), speed = getPreySpeed();
  let type, sprite, points, moveType;
  if (r < 0.35) { type = 'bug'; sprite = bugSprite; points = 10; moveType = 'straight'; }
  else if (r < 0.6) { type = 'bird'; sprite = birdSprite; points = 20; moveType = 'zigzag'; }
  else if (r < 0.8) { type = 'lizard'; sprite = lizardSprite; points = 30; moveType = 'fast'; }
  else if (r < 0.92) { type = 'butterfly'; sprite = butterflySprite; points = 50; moveType = 'wave'; }
  else { type = 'bomb'; sprite = bombSprite; points = 0; moveType = 'straight'; }
  const x = 30 + Math.random() * (W - 60);
  const speedMul = type === 'lizard' ? 1.8 : type === 'butterfly' ? 0.6 : type === 'bomb' ? 0.9 : 1;
  prey.push({ type, sprite, points, moveType, x, y: -20, baseX: x, speed: speed * speedMul, phase: Math.random() * Math.PI * 2, w: sprite.width, h: sprite.height, rotation: 0 });
}

function spawnPowerup() {
  const r = Math.random(); let type, sprite;
  if (r < 0.3) { type = 'magnet'; sprite = magnetSprite; }
  else if (r < 0.55) { type = 'slow'; sprite = slowSprite; }
  else if (r < 0.8) { type = 'frenzy'; sprite = frenzySprite; }
  else { type = 'life'; sprite = lifeSprite; }
  powerups.push({ type, sprite, x: 40 + Math.random() * (W - 80), y: -20, speed: 1.5, w: sprite.width, h: sprite.height, glow: 0 });
}

function spawnBoss() {
  bossWarning = 120;
  setTimeout(() => {
    boss = {
      x: W / 2, y: -80,
      hoverY: 120,
      w: bossSprite.width, h: bossSprite.height,
      hp: 3 + Math.floor(level / 3),
      maxHp: 3 + Math.floor(level / 3),
      phase: 0, flashTimer: 0,
      // State machine: 'enter' -> 'hover' -> 'dive_warn' -> 'dive' -> 'retreat' -> 'hover'
      bstate: 'enter',
      stateTimer: 0,
      diveTargetX: W / 2,
      diveSpeed: 6,
      vulnerable: false,
    };
    SFX.boss();
  }, 2000);
}

// =====================================================
//  UPDATE
// =====================================================
function update() {
  if (state !== 'playing') return;
  gameTime++;
  levelTimer++;
  if (shakeDur > 0) { shakeDur--; shakeX = (Math.random()-.5)*shakeDur*.8; shakeY = (Math.random()-.5)*shakeDur*.8; }
  else { shakeX = 0; shakeY = 0; }

  if (levelTimer > 900) { levelTimer = 0; level++; SFX.levelUp(); addFloatText('LEVEL ' + level, W/2, H/2-50, '#ffd700', 24, 90); shake(8); }
  if (comboTimer > 0) { comboTimer--; if (comboTimer <= 0) combo = 0; }
  for (const k in activePowerups) { if (activePowerups[k] > 0) activePowerups[k]--; }

  // Player bob animation
  player.bobPhase += 0.08;

  // Player vertical dash (jump)
  if (player.dashing) {
    player.vy += 0.55; // gravity
    player.y += player.vy;
    // Trail while in air
    if (gameTime % 2 === 0) {
      trails.push({ x: player.x, y: player.y + 20, alpha: 0.4, life: 8 });
    }
    // Landed
    if (player.y >= player.groundY) {
      player.y = player.groundY;
      player.vy = 0;
      player.dashing = false;
    }
  }

  // Horizontal movement (works during dash too)
  let moveDir = 0;
  if (keys['ArrowLeft'] || keys['a']) moveDir = -1;
  if (keys['ArrowRight'] || keys['d']) moveDir = 1;
  if (touchX !== null) { const diff = touchX - player.x; if (Math.abs(diff) > 10) moveDir = diff > 0 ? 1 : -1; }
  if (moveDir !== 0) {
    player.speed += moveDir * player.accel;
    player.speed = Math.max(-player.maxSpeed, Math.min(player.maxSpeed, player.speed));
    player.facing = moveDir;
  } else { player.speed *= player.friction; }
  player.x += player.speed;
  player.x = Math.max(24, Math.min(W - 24, player.x));
  player.dashCooldown = Math.max(0, player.dashCooldown - 1);
  if (player.invincible > 0) player.invincible--;

  // Spawn
  spawnTimer++;
  if (spawnTimer >= getSpawnRate()) { spawnTimer = 0; const c = level >= 5 ? (Math.random() < 0.3 ? 2 : 1) : 1; for (let i = 0; i < c; i++) spawnPrey(); }
  powerupTimer++;
  if (powerupTimer >= 400 + Math.random() * 200) { powerupTimer = 0; spawnPowerup(); }
  if (!boss && bossWarning <= 0) { bossTimer++; if (bossTimer >= 1800) { bossTimer = 0; spawnBoss(); } }
  if (bossWarning > 0) bossWarning--;

  const magnetActive = activePowerups.magnet > 0;
  const catchR = player.catchRadius + (activePowerups.frenzy > 0 ? 15 : 0);

  // Update prey
  for (let i = prey.length - 1; i >= 0; i--) {
    const p = prey[i];
    p.y += p.speed; p.phase += 0.05;
    if (p.moveType === 'zigzag') p.x = p.baseX + Math.sin(p.phase * 2) * 40;
    else if (p.moveType === 'wave') { p.x = p.baseX + Math.sin(p.phase) * 60; p.y -= p.speed * 0.3; }
    if (magnetActive && p.type !== 'bomb') { const dx = player.x - p.x, dy = player.y - p.y, dist = Math.sqrt(dx*dx+dy*dy); if (dist < 150) { p.x += (dx/dist)*3; p.y += (dy/dist)*2; } }
    p.rotation += (p.type === 'bomb' ? 0.05 : 0.02);
    const dx = player.x - p.x, dy = player.y - (p.y + p.h/2), dist = Math.sqrt(dx*dx+dy*dy);
    if (dist < catchR + p.w/2) {
      if (p.type === 'bomb') { if (player.invincible <= 0) { lives--; SFX.bomb(); shake(12); player.invincible = 60; spawnCatchParticles(p.x, p.y, '#ff4444', 15); addFloatText('BOOM!', p.x, p.y, '#ff4444', 16, 45); if (lives <= 0) gameOver(); } }
      else catchPrey(p);
      prey.splice(i, 1); continue;
    }
    if (p.y > H + 20) {
      if (p.type !== 'bomb' && p.type !== 'butterfly') { combo = 0; comboTimer = 0; missCount++; SFX.miss(); addFloatText('MISS', p.x, H-40, '#ff4444', 12, 30); if (missCount >= 3) { missCount = 0; lives--; shake(6); addFloatText('-1 ♥', W/2, H/2, '#ff4444', 16, 50); if (lives <= 0) gameOver(); } }
      prey.splice(i, 1);
    }
  }

  // Update powerups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i]; p.y += p.speed; p.glow += 0.1;
    const dx = player.x - p.x, dy = player.y - p.y, dist = Math.sqrt(dx*dx+dy*dy);
    if (dist < 40) { activatePowerup(p); powerups.splice(i, 1); continue; }
    if (p.y > H + 20) powerups.splice(i, 1);
  }

  // Update boss
  if (boss) {
    boss.phase += 0.03;
    if (boss.flashTimer > 0) boss.flashTimer--;
    boss.stateTimer++;

    switch (boss.bstate) {
      case 'enter':
        // Descend to hover position
        boss.y += 2;
        if (boss.y >= boss.hoverY) {
          boss.y = boss.hoverY;
          boss.bstate = 'hover';
          boss.stateTimer = 0;
        }
        boss.x = W / 2 + Math.sin(boss.phase) * 60;
        break;

      case 'hover':
        // Sway at top, drop occasional bombs
        boss.x = W / 2 + Math.sin(boss.phase) * (100 + level * 8);
        boss.x = Math.max(boss.w / 2, Math.min(W - boss.w / 2, boss.x));
        boss.vulnerable = false;
        // Drop bombs periodically
        if (boss.stateTimer % Math.max(50, 90 - level * 5) === 0 && boss.stateTimer > 0) {
          prey.push({ type: 'bomb', sprite: bombSprite, points: 0, moveType: 'straight', x: boss.x, y: boss.y + boss.h / 2, baseX: boss.x, speed: 3, phase: 0, w: bombSprite.width, h: bombSprite.height, rotation: 0 });
        }
        // After hovering, start dive warning
        if (boss.stateTimer >= 150) {
          boss.bstate = 'dive_warn';
          boss.stateTimer = 0;
          boss.diveTargetX = player.x; // Lock onto player position
        }
        break;

      case 'dive_warn':
        // Flash for ~1 second, then dive
        boss.x = boss.x + (boss.diveTargetX - boss.x) * 0.05; // Slowly align with player
        boss.vulnerable = false;
        if (boss.stateTimer >= 60) {
          boss.bstate = 'dive';
          boss.stateTimer = 0;
          boss.diveTargetX = player.x; // Final lock
          SFX.dash();
        }
        break;

      case 'dive':
        // Swoop down fast toward player level
        boss.y += boss.diveSpeed + level * 0.5;
        boss.vulnerable = true;
        // Slight tracking
        boss.x += (boss.diveTargetX - boss.x) * 0.02;
        // Check if reached player level
        if (boss.y >= player.y - 30) {
          boss.bstate = 'retreat';
          boss.stateTimer = 0;
          // If player not dashing and boss hits player area
          if (!player.dashing && Math.abs(player.x - boss.x) < 50 && player.invincible <= 0) {
            lives--;
            SFX.bomb();
            shake(8);
            player.invincible = 60;
            addFloatText('OUCH!', player.x, player.y - 30, '#ff4444', 14, 40);
            if (lives <= 0) gameOver();
          }
        }
        break;

      case 'retreat':
        // Fly back up
        boss.y -= 4;
        boss.vulnerable = false;
        boss.x += (W / 2 - boss.x) * 0.03;
        if (boss.y <= boss.hoverY) {
          boss.y = boss.hoverY;
          boss.bstate = 'hover';
          boss.stateTimer = 0;
        }
        break;
    }

    // Hit detection: player dash into boss when vulnerable or close enough
    const dx = player.x - boss.x, dy = player.y - boss.y, dist = Math.sqrt(dx * dx + dy * dy);
    if (player.dashing && dist < 70) {
      boss.hp--; boss.flashTimer = 15; SFX.bossHit(); shake(10);
      spawnCatchParticles(boss.x, boss.y, '#a855f7', 20);
      addFloatText('HIT!', boss.x, boss.y - 20, '#ffd700', 18, 40);
      // Knock boss back up
      boss.bstate = 'retreat';
      boss.stateTimer = 0;
      if (boss.hp <= 0) {
        const bonus = 200 * level; score += bonus; SFX.bossDead(); shake(15);
        spawnCatchParticles(boss.x, boss.y, '#ffd700', 40);
        spawnCatchParticles(boss.x, boss.y, '#ff69b4', 30);
        addFloatText('BOSS DOWN! +' + bonus, W / 2, boss.y, '#ffd700', 16, 90);
        boss = null;
      }
    }
  }

  // Particles, floats, trails
  for (let i = particles.length-1; i >= 0; i--) { const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += p.gravity||0.1; p.life--; p.alpha = p.life/p.maxLife; if (p.life <= 0) particles.splice(i, 1); }
  for (let i = floatTexts.length-1; i >= 0; i--) { const t = floatTexts[i]; t.y -= t.rise||1.5; t.life--; t.alpha = Math.min(1, t.life/20); t.scale = 1 + (1 - t.life/t.maxLife)*0.3; if (t.life <= 0) floatTexts.splice(i, 1); }
  for (let i = trails.length-1; i >= 0; i--) { trails[i].life--; trails[i].alpha *= 0.9; if (trails[i].life <= 0) trails.splice(i, 1); }
}

function catchPrey(p) {
  combo++; comboTimer = 90; maxCombo = Math.max(maxCombo, combo);
  const multiplier = activePowerups.frenzy > 0 ? 2 : 1;
  const comboMul = combo >= 20 ? 5 : combo >= 10 ? 3 : combo >= 5 ? 2 : 1;
  const gained = p.points * multiplier * comboMul;
  score += gained;
  SFX.catch();
  if (combo > 0 && combo % 5 === 0) SFX.combo();
  const intensity = Math.min(combo, 20);
  spawnCatchParticles(p.x, p.y, getPreyColor(p.type), 5 + intensity);
  shake(2 + Math.min(intensity / 3, 5));
  let label = '+' + gained;
  if (comboMul > 1) label += ' x' + comboMul;
  addFloatText(label, p.x, p.y, '#ffd700', 12 + Math.min(combo, 8), 40);
  if (combo === 5) addFloatText('5 COMBO!', W/2, H/2, '#ff69b4', 18, 60);
  if (combo === 10) addFloatText('10 COMBO!!', W/2, H/2, '#ffd700', 22, 70);
  if (combo === 20) addFloatText('20 COMBO!!!', W/2, H/2, '#ff4444', 26, 80);
}

function getPreyColor(type) { return {bug:'#4ade80',bird:'#60a5fa',lizard:'#10b981',butterfly:'#a855f7'}[type]||'#ffd700'; }

function activatePowerup(p) {
  SFX.powerup(); shake(5); spawnCatchParticles(p.x, p.y, '#ffd700', 15);
  switch (p.type) {
    case 'magnet': activePowerups.magnet = 600; addFloatText('MAGNET!', p.x, p.y, '#ef4444', 16, 50); break;
    case 'slow': activePowerups.slow = 480; addFloatText('SLOW-MO!', p.x, p.y, '#3b82f6', 16, 50); break;
    case 'frenzy': activePowerups.frenzy = 480; addFloatText('FRENZY!', p.x, p.y, '#f59e0b', 16, 50); break;
    case 'life': if (lives < maxLives) { lives++; SFX.life(); addFloatText('+1 LIFE', p.x, p.y, '#ec4899', 16, 50); } else { score += 100; addFloatText('+100', p.x, p.y, '#ffd700', 14, 40); } break;
  }
}

function shake(amount) { shakeDur = amount; }
function spawnCatchParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) { const angle = (Math.PI*2/count)*i+Math.random()*.5, speed = 2+Math.random()*4; particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed-2, color, size: 2+Math.random()*3, life: 20+Math.random()*20, maxLife: 40, alpha: 1, gravity: 0.15 }); }
}
function addFloatText(text, x, y, color, size, life) { floatTexts.push({ text, x, y, color, size, life, maxLife: life, alpha: 1, scale: 1 }); }

function gameOver() {
  state = 'gameover';
  if (score > highScore) { highScore = score; try { localStorage.setItem('kh_hi', highScore.toString()); } catch(e) {} }
}
function startGame() { state = 'playing'; }
function resetGame() {
  score = 0; lives = 3; combo = 0; maxCombo = 0; comboTimer = 0; missCount = 0;
  level = 1; levelTimer = 0; gameTime = 0;
  spawnTimer = 0; powerupTimer = 0; bossTimer = 0;
  player.x = W/2; player.y = player.groundY; player.speed = 0; player.vy = 0; player.dashing = false;
  player.dashCooldown = 0; player.invincible = 0; player.facing = 1;
  activePowerups = { magnet: 0, slow: 0, frenzy: 0 };
  prey = []; powerups = []; particles = []; floatTexts = []; trails = [];
  boss = null; bossWarning = 0; state = 'playing';
}

// =====================================================
//  DRAWING
// =====================================================
function drawBg() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  if (activePowerups.frenzy > 0) { g.addColorStop(0,'#2d0a00'); g.addColorStop(0.5,'#1a0500'); g.addColorStop(1,'#0d0200'); }
  else if (activePowerups.slow > 0) { g.addColorStop(0,'#000a2d'); g.addColorStop(0.5,'#00051a'); g.addColorStop(1,'#00020d'); }
  else { g.addColorStop(0,'#0a0012'); g.addColorStop(0.5,'#140a28'); g.addColorStop(1,'#0d0518'); }
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
}

function drawStars() {
  const t = gameTime * 0.01;
  stars.forEach(s => {
    const alpha = 0.3 + Math.sin(s.blink + t) * 0.3;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    const y = (s.y + gameTime * s.speed) % H;
    ctx.fillRect(s.x, y, s.s, s.s);
  });
}

function drawGround() {
  const groundY = H - 30;
  ctx.fillStyle = '#1a0a30'; ctx.fillRect(0, groundY, W, 30);
  ctx.shadowColor = '#ff69b4'; ctx.shadowBlur = 10;
  ctx.strokeStyle = '#ff69b4'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(W, groundY); ctx.stroke();
  ctx.shadowBlur = 0;
  for (let i = 0; i < W; i += 16) {
    const shade = Math.sin(i * 0.1 + gameTime * 0.02) * 0.05;
    ctx.fillStyle = `rgba(255,105,180,${0.1 + shade})`;
    ctx.fillRect(i, groundY + 4, 8, 2);
    ctx.fillRect(i + 4, groundY + 10, 6, 2);
  }
}

function drawPlayer() {
  ctx.save();
  const bob = player.dashing ? 0 : Math.sin(player.bobPhase) * 2;
  ctx.translate(player.x, player.y + bob);

  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2) { ctx.restore(); return; }

  // Vertical dash trails (afterimages below player)
  trails.forEach(t => {
    ctx.globalAlpha = t.alpha * 0.3;
    ctx.save();
    ctx.translate(t.x - player.x, t.y - player.y - bob);
    ctx.scale(player.facing, 1);
    ctx.drawImage(KELEBEK_GAME, -player.w/2 * player.facing, -player.h/2, player.w, player.h);
    ctx.restore();
  });
  ctx.globalAlpha = 1;

  // Glow (brighter when dashing)
  const glowColor = player.dashing ? '#fff' : activePowerups.frenzy > 0 ? '#f59e0b' : activePowerups.magnet > 0 ? '#ef4444' : activePowerups.slow > 0 ? '#3b82f6' : '#ff69b4';
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = player.dashing ? 25 : 15 + Math.sin(gameTime * 0.1) * 5;

  // Draw Kelebek
  ctx.save();
  ctx.scale(player.facing, 1);
  ctx.drawImage(KELEBEK_GAME, -player.w/2 * player.facing, -player.h/2, player.w, player.h);
  ctx.restore();
  ctx.shadowBlur = 0;

  // Catch radius indicator when powered up
  if (activePowerups.frenzy > 0 || activePowerups.magnet > 0) {
    const r = player.catchRadius + (activePowerups.frenzy > 0 ? 15 : 0);
    ctx.strokeStyle = `rgba(255,215,0,${0.2 + Math.sin(gameTime * 0.1) * 0.1})`;
    ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(0, 0, r + 10, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.restore();
}

function drawPrey() {
  prey.forEach(p => {
    ctx.save(); ctx.translate(p.x, p.y);
    if (p.type === 'bomb') { ctx.rotate(Math.sin(p.rotation)*.2); ctx.shadowColor = '#ff4444'; ctx.shadowBlur = 8 + Math.sin(gameTime*.2)*4; }
    else if (p.type === 'butterfly') { ctx.rotate(Math.sin(p.phase*3)*.3); ctx.shadowColor = '#a855f7'; ctx.shadowBlur = 6; }
    ctx.drawImage(p.sprite, -p.w/2, -p.h/2);
    ctx.shadowBlur = 0; ctx.restore();
  });
}

function drawPowerups() {
  powerups.forEach(p => {
    ctx.save(); ctx.translate(p.x, p.y + Math.sin(p.glow*2)*4);
    ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 10 + Math.sin(p.glow*3)*5;
    ctx.drawImage(p.sprite, -p.w/2, -p.h/2);
    ctx.shadowBlur = 0; ctx.restore();
  });
}

function drawBoss() {
  if (!boss) return;
  ctx.save(); ctx.translate(boss.x, boss.y);
  if (boss.flashTimer > 0) ctx.globalAlpha = 0.5 + Math.sin(boss.flashTimer)*.5;
  // Red glow when diving
  if (boss.bstate === 'dive') {
    ctx.shadowColor = '#ff4444'; ctx.shadowBlur = 30;
  } else if (boss.bstate === 'dive_warn') {
    ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 15 + Math.sin(gameTime * 0.3) * 10;
  } else {
    ctx.shadowColor = '#a855f7'; ctx.shadowBlur = 20;
  }
  ctx.drawImage(bossSprite, -boss.w/2, -boss.h/2);
  ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  const barW = 60, barH = 6;
  ctx.fillStyle = '#333'; ctx.fillRect(-barW/2, -boss.h/2-15, barW, barH);
  ctx.fillStyle = boss.hp > boss.maxHp/2 ? '#4ade80' : boss.hp > 1 ? '#f59e0b' : '#ef4444';
  ctx.fillRect(-barW/2, -boss.h/2-15, barW*(boss.hp/boss.maxHp), barH);
  // Dive warning indicator
  if (boss.bstate === 'dive_warn') {
    ctx.globalAlpha = 0.5 + Math.sin(gameTime * 0.3) * 0.3;
    ctx.strokeStyle = '#ff4444'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, boss.h/2 + 5); ctx.lineTo(0, player.y - boss.y - 10); ctx.stroke();
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

function drawBossWarning() {
  if (bossWarning <= 0) return;
  const alpha = Math.sin(bossWarning*.15)*.3+.3;
  ctx.fillStyle = `rgba(255,0,0,${alpha*0.1})`; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.textAlign = 'center';
  ctx.fillStyle = `rgba(255,68,68,${alpha+.3})`; ctx.font = '18px "Press Start 2P"'; ctx.fillText('⚠ BOSS ⚠', W/2, H/2);
  ctx.font = '10px "Press Start 2P"'; ctx.fillStyle = `rgba(255,200,200,${alpha})`; ctx.fillText('JUMP INTO IT WHEN IT DIVES!', W/2, H/2+30);
  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => { ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size); });
  ctx.globalAlpha = 1;
}

function drawFloatTexts() {
  floatTexts.forEach(t => {
    ctx.save(); ctx.globalAlpha = t.alpha; ctx.textAlign = 'center';
    ctx.font = `${Math.floor(t.size*t.scale)}px "Press Start 2P"`;
    ctx.fillStyle = '#000'; ctx.fillText(t.text, t.x+1, t.y+1);
    ctx.fillStyle = t.color; ctx.fillText(t.text, t.x, t.y);
    ctx.restore();
  });
}

function drawHUD() {
  ctx.font = '12px "Press Start 2P"'; ctx.textAlign = 'left';
  for (let i = 0; i < maxLives; i++) { ctx.fillStyle = i < lives ? '#ff69b4' : '#333'; ctx.fillText('♥', 10+i*20, 25); }
  ctx.textAlign = 'right'; ctx.fillStyle = '#ffd700'; ctx.font = '14px "Press Start 2P"'; ctx.fillText(score.toString(), W-10, 25);
  ctx.textAlign = 'left'; ctx.fillStyle = '#888'; ctx.font = '8px "Press Start 2P"'; ctx.fillText('LV.'+level, 10, 45);

  if (combo >= 3) {
    ctx.textAlign = 'center';
    const comboSize = Math.min(12+combo, 24);
    const comboColor = combo >= 20 ? '#ff4444' : combo >= 10 ? '#ffd700' : '#ff69b4';
    ctx.font = `${comboSize}px "Press Start 2P"`; ctx.fillStyle = comboColor;
    const pulse = 1 + Math.sin(gameTime*.2)*.05;
    ctx.save(); ctx.translate(W/2, 65); ctx.scale(pulse, pulse); ctx.fillText(combo+'x COMBO', 0, 0); ctx.restore();
  }

  let indicatorX = W - 10; ctx.textAlign = 'right'; ctx.font = '8px "Press Start 2P"';
  if (activePowerups.magnet > 0) { ctx.fillStyle = '#ef4444'; ctx.fillText('MAG '+Math.ceil(activePowerups.magnet/60)+'s', indicatorX, 45); indicatorX -= 80; }
  if (activePowerups.slow > 0) { ctx.fillStyle = '#3b82f6'; ctx.fillText('SLO '+Math.ceil(activePowerups.slow/60)+'s', indicatorX, 45); indicatorX -= 80; }
  if (activePowerups.frenzy > 0) { ctx.fillStyle = '#f59e0b'; ctx.fillText('FRZ '+Math.ceil(activePowerups.frenzy/60)+'s', indicatorX, 45); }

  ctx.textAlign = 'center'; ctx.font = '7px "Press Start 2P"';
  if (player.dashCooldown > 0) { ctx.fillStyle = '#555'; ctx.fillText('JUMP...', W/2, H-8); }
  else if (state === 'playing' && !player.dashing) { ctx.fillStyle = '#ff69b480'; ctx.fillText('⚡ JUMP READY', W/2, H-8); }
}

function drawTitle() {
  drawBg(); drawStars();
  ctx.textAlign = 'center';
  ctx.fillStyle = '#9b30ff'; ctx.font = '11px "Press Start 2P"'; ctx.fillText('adopt.exe', W/2, 80);
  ctx.fillStyle = '#555'; ctx.font = '7px "Press Start 2P"'; ctx.fillText('presents', W/2, 100);

  ctx.shadowColor = '#ff69b4'; ctx.shadowBlur = 20;
  ctx.fillStyle = '#ff69b4'; ctx.font = '22px "Press Start 2P"'; ctx.fillText("KELEBEK'S", W/2, 170);
  ctx.fillStyle = '#ffd700'; ctx.font = '28px "Press Start 2P"'; ctx.fillText('HUNT', W/2, 210);
  ctx.shadowBlur = 0;

  // Real Kelebek image on title screen
  if (KELEBEK_TITLE.complete) {
    ctx.shadowColor = '#ff69b4'; ctx.shadowBlur = 25;
    ctx.drawImage(KELEBEK_TITLE, W/2 - 65, 240, 130, 180);
    ctx.shadowBlur = 0;
  }

  ctx.fillStyle = '#ffb6c1'; ctx.font = '8px "Press Start 2P"'; ctx.fillText('THE RANGER HUNTS AT DUSK', W/2, 450);
  ctx.fillStyle = '#888'; ctx.font = '7px "Press Start 2P"';
  ctx.fillText('← → MOVE', W/2, 490);
  ctx.fillText('TAP to JUMP, DRAG to MOVE', W/2, 510);
  ctx.fillText('CATCH PREY, DODGE BOMBS', W/2, 530);
  ctx.fillText('JUMP INTO BOSSES!', W/2, 550);

  if (highScore > 0) { ctx.fillStyle = '#ffd700'; ctx.font = '8px "Press Start 2P"'; ctx.fillText('HIGH SCORE: '+highScore, W/2, 585); }

  if (Math.floor(gameTime/30) % 2) { ctx.fillStyle = '#ff69b4'; ctx.font = '12px "Press Start 2P"'; ctx.fillText('TAP TO START', W/2, 630); }
  ctx.fillStyle = '#333'; ctx.font = '6px "Press Start 2P"'; ctx.fillText('@adopt.exe_', W/2, H-20);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(10, 0, 18, 0.85)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.shadowColor = '#ff4444'; ctx.shadowBlur = 15; ctx.fillStyle = '#ff4444'; ctx.font = '22px "Press Start 2P"'; ctx.fillText('GAME OVER', W/2, 130); ctx.shadowBlur = 0;
  ctx.fillStyle = '#ffd700'; ctx.font = '14px "Press Start 2P"'; ctx.fillText('SCORE', W/2, 190);
  ctx.font = '24px "Press Start 2P"'; ctx.fillText(score.toString(), W/2, 230);
  ctx.fillStyle = '#888'; ctx.font = '8px "Press Start 2P"'; ctx.fillText('HIGH SCORE: '+highScore, W/2, 265);
  if (score >= highScore && score > 0) { ctx.fillStyle = '#ffd700'; ctx.font = '10px "Press Start 2P"'; ctx.fillText('★ NEW RECORD ★', W/2, 290); }
  ctx.fillStyle = '#cc88ff'; ctx.font = '8px "Press Start 2P"';
  ctx.fillText('MAX COMBO: '+maxCombo, W/2, 325);
  ctx.fillText('LEVEL: '+level, W/2, 345);

  // Real Kelebek on game over
  if (KELEBEK_TITLE.complete) {
    ctx.shadowColor = '#ff69b4'; ctx.shadowBlur = 15;
    ctx.drawImage(KELEBEK_TITLE, W/2 - 50, 370, 100, 138);
    ctx.shadowBlur = 0;
  }

  ctx.fillStyle = '#44ff44'; ctx.font = '9px "Press Start 2P"'; ctx.fillText('ADOPT KELEBEK', W/2, 535);
  if (Math.floor(gameTime/30) % 2) { ctx.fillStyle = '#ff69b4'; ctx.font = '12px "Press Start 2P"'; ctx.fillText('TAP TO RETRY', W/2, 610); }
  ctx.fillStyle = '#9b30ff'; ctx.font = '9px "Press Start 2P"'; ctx.fillText('adopt.exe', W/2, H-30);
}

function drawScanlines() { ctx.fillStyle = 'rgba(0,0,0,0.04)'; for (let y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1); }

// =====================================================
//  GAME LOOP
// =====================================================
function gameLoop() {
  gameTime++;
  ctx.save();
  if (state === 'playing') ctx.translate(shakeX, shakeY);
  switch (state) {
    case 'title': drawTitle(); break;
    case 'playing': update(); drawBg(); drawStars(); drawGround(); drawPrey(); drawPowerups(); drawBoss(); drawBossWarning(); drawPlayer(); drawParticles(); drawFloatTexts(); drawHUD(); break;
    case 'gameover': drawBg(); drawStars(); drawGameOver(); break;
  }
  ctx.restore();
  drawScanlines();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
