const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function initAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function playSound(freq, dur, type='square') {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  g.gain.setValueAtTime(0.12, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function playCatch() { playSound(523,0.08); setTimeout(()=>playSound(659,0.08),60); setTimeout(()=>playSound(784,0.12),120); setTimeout(()=>playSound(1047,0.15),180); }
function playMiss() { playSound(180,0.3,'sawtooth'); }
function playLevelUp() { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playSound(f,0.15),i*100)); }
function playCombo() { playSound(880,0.1); setTimeout(()=>playSound(1100,0.15),80); }
function playGameOver() { [400,350,300,200].forEach((f,i)=>setTimeout(()=>playSound(f,0.25),i*200)); }
function playCountdown() { playSound(440, 0.15); }

function createPixelSprite(design, colors, w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const cx = c.getContext('2d');
  const pw = w / design[0].length;
  const ph = h / design.length;
  design.forEach((row, y) => {
    [...row].forEach((ch, x) => {
      if (colors[ch]) {
        cx.fillStyle = colors[ch];
        cx.fillRect(x*pw, y*ph, pw+0.5, ph+0.5);
      }
    });
  });
  return c;
}

// ==================== EFFECTS ====================
function shake(intensity=5, duration=8) { shakeX=intensity; shakeY=intensity; shakeTime=duration; }
function flash(color='#fff', alpha=0.3) { flashColor=color; flashAlpha=alpha; }

function addParticles(x,y,color,count,spread=8) {
  for(let i=0;i<count;i++) particles.push({
    x,y, vx:(Math.random()-0.5)*spread, vy:(Math.random()-0.5)*spread-4,
    size:Math.random()*5+2, color, life:1, rot:Math.random()*6.28,
    type: Math.random()>0.5?'square':'circle'
  });
}

function addSparkle(x,y) {
  for(let i=0;i<6;i++) sparkles.push({
    x:x+(Math.random()-0.5)*40, y:y+(Math.random()-0.5)*40,
    size:Math.random()*6+3, life:1, color:'#FFD700'
  });
}

function addFloatingText(x,y,text,color,size=12,bold=false) {
  floatingTexts.push({x,y,text,color,life:1,vy:-2.5,size,bold,scale:1.5});
}

function showLootPopup(x,y,text) {

}

// ==================== GAME ====================
function spawnPrey() {
  const t = PREY[Math.floor(Math.random()*PREY.length)];
  preyList.push({
    x:Math.random()*(W-80)+40, y:-40, type:t,
    speed:t.speed*(0.8+difficulty*0.25),
    wobble:Math.random()*Math.PI*2, wobbleSpeed:0.03+Math.random()*0.03,
    alive:true, rot:0
  });
}

function addXP(amount) {
  xpBar += amount;
  if (xpBar >= xpNeeded) {
    xpBar -= xpNeeded;
    level++;
    xpNeeded = Math.floor(xpNeeded * 1.4);
    flash('#9b30ff', 0.4);
    shake(8, 15);
    addFloatingText(W/2, H/2 - 50, `LEVEL ${level}!`, '#FFD700', 18, true);
    playLevelUp();
    // Bonus points
    score += level * 50;
    addFloatingText(W/2, H/2 - 20, `+${level*50} BONUS`, '#ff69b4', 12);
  }
}

function resetGame() {
  score=0;lives=3;combo=0;maxCombo=0;gameTime=0;difficulty=1;
  xpBar=0;level=1;xpNeeded=100;
  preyList=[];particles=[];floatingTexts=[];sparkles=[];
  spawnTimer=0;player.x=W/2;player.sprite='idle';
  state='countdown';countdownTimer=0;countdownNum=3;
}

// ==================== UPDATE ====================
function update() {
  // Shake decay
  if(shakeTime>0){shakeTime--;shakeX*=0.8;shakeY*=0.8;}else{shakeX=0;shakeY=0;}
  if(flashAlpha>0)flashAlpha-=0.03;

  // Sparkles
  sparkles.forEach(s=>{s.life-=0.03;s.size*=0.97;});
  sparkles=sparkles.filter(s=>s.life>0);

  // Loot popup
  if(lootPopup.active){
    lootPopup.timer--;
    lootPopup.scale = Math.min(1, lootPopup.scale + 0.15);
    if(lootPopup.timer<=0) lootPopup.active=false;
  }

  if(state==='countdown'){
    countdownTimer++;
    if(countdownTimer%40===0){
      countdownNum--;
      if(countdownNum>0) playCountdown();
      else { playGo(); state='playing'; }
    }
    return;
  }

  if(state!=='playing')return;

  gameTime++;
  difficulty = 1 + gameTime / 1500;
  player.bobTimer += 0.08;

  // Spawn
  spawnTimer++;
  const interval = Math.max(25, spawnInterval - gameTime/15);
  if(spawnTimer>=interval){spawnPrey();spawnTimer=0;}

  // Player movement
  player.dx=0;
  if(keys['ArrowLeft']||keys['a']){player.dx=-player.speed;player.facing=-1;}
  if(keys['ArrowRight']||keys['d']){player.dx=player.speed;player.facing=1;}
  if(touchActive&&touchX!==null){
    const diff=touchX-player.x;
    if(Math.abs(diff)>8){player.dx=Math.sign(diff)*Math.min(player.speed,Math.abs(diff)*0.15);player.facing=Math.sign(diff);}
  }
  player.x+=player.dx;
  player.x=Math.max(50,Math.min(W-50,player.x));

  if(player.spriteTimer>0){player.spriteTimer--;if(player.spriteTimer<=0)player.sprite='idle';}

  // Prey
  preyList.forEach(prey=>{
    if(!prey.alive)return;
    prey.y+=prey.speed;
    prey.wobble+=prey.wobbleSpeed;
    prey.x+=Math.sin(prey.wobble)*1.2;
    prey.rot=Math.sin(prey.wobble)*0.15;

    // Collision
    const dx=prey.x-player.x, dy=prey.y-player.y;
    if(Math.abs(dx)<55&&Math.abs(dy)<55){
      prey.alive=false;
      const mult = 1+Math.floor(combo/5);
      const pts = prey.type.points*mult;
      score+=pts;
      combo++;
      if(combo>maxCombo) maxCombo=combo;
      addXP(prey.type.points);

      player.sprite='loot';player.spriteTimer=25;

      // Effects!
      shake(combo>=10?10:combo>=5?7:4, combo>=10?15:10);
      addParticles(prey.x,prey.y,'#FFD700',15,10);
      addParticles(prey.x,prey.y,prey.type.color,8,6);
      addParticles(prey.x,prey.y,'#ff69b4',5,8);
      addSparkle(prey.x,prey.y);

      if(combo>=10) flash('#9b30ff',0.25);
      else if(combo>=5) flash('#ff69b4',0.15);

      showLootPopup(prey.x, prey.y-30, `LOOT! +${pts}`);

      const bonus = mult>1?` x${mult}`:'';
      addFloatingText(prey.x+30,prey.y-20,`+${pts}${bonus}`,prey.type.color,combo>=10?16:12);

      if(combo===5){addFloatingText(W/2,H/3,'C O M B O !','#ff69b4',16,true);playCombo();}
      if(combo===10){addFloatingText(W/2,H/3,'M E G A !','#9b30ff',18,true);playCombo();}
      if(combo===20){addFloatingText(W/2,H/3,'U L T R A !','#FFD700',20,true);playCombo();}
      
      playCatch();
    }

    // Miss
    if(prey.y>H+20){
      prey.alive=false;
      lives--;combo=0;
      addFloatingText(prey.x,H-60,'MISS!','#ff4444',14,true);
      addParticles(prey.x,H-80,'#ff4444',8,5);
      shake(3,5);
      flash('#ff0000',0.15);
      playMiss();
      if(lives<=0){if(score>highScore)highScore=score;playGameOver();state='gameover';}
    }
  });

  preyList=preyList.filter(p=>p.alive);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.25;p.life-=0.025;p.rot+=0.1;});
  particles=particles.filter(p=>p.life>0);
  floatingTexts.forEach(t=>{t.y+=t.vy;t.life-=0.018;t.scale=Math.max(1,t.scale-0.05);});
  floatingTexts=floatingTexts.filter(t=>t.life>0);
}

// ==================== DRAW ====================
function drawPixelForest() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0,H-200,0,H-80);
  sky.addColorStop(0,'transparent');
  sky.addColorStop(1,'rgba(30,60,30,0.15)');
  ctx.fillStyle=sky;
  ctx.fillRect(0,H-200,W,120);

  // Trees
  trees.forEach(t=>{
    ctx.fillStyle='#2a1a0a';
    ctx.fillRect(t.x+t.w/2-3,H-100-t.h,6,t.h);
    ctx.fillStyle=t.green;
    // Canopy (pixelated circles)
    for(let i=0;i<3;i++){
      const cx=t.x+t.w/2+(i-1)*8;
      const cy=H-100-t.h-5+Math.abs(i-1)*5;
      const r=t.w/2+5-Math.abs(i-1)*3;
      ctx.fillRect(cx-r,cy-r,r*2,r*2);
    }
  });
}

function drawGround() {
  // Ground layers
  ctx.fillStyle='#1a3a1a';
  ctx.fillRect(0,H-90,W,90);
  ctx.fillStyle='#224422';
  ctx.fillRect(0,H-90,W,4);
  ctx.fillStyle='#2a5a2a';
  ctx.fillRect(0,H-88,W,2);

  // Grass tufts
  grassTufts.forEach(g=>{
    ctx.fillStyle=g.color;
    ctx.fillRect(g.x,H-90-g.h,g.w,g.h);
  });

  // Dandelions
  const t = Date.now()/1000;
  dandelions.forEach(d=>{
    const sway = Math.sin(t+d.phase)*2;
    ctx.strokeStyle='#3a6a2a';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(d.x,H-90);
    ctx.lineTo(d.x+sway,H-105);
    ctx.stroke();
    // Flower
    ctx.fillStyle='#FFD700';
    ctx.beginPath();
    ctx.arc(d.x+sway,H-107,4,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#FFEE44';
    ctx.beginPath();
    ctx.arc(d.x+sway,H-107,2,0,Math.PI*2);
    ctx.fill();
  });
}

function drawStars() {
  const t=Date.now()/1000;
  stars.forEach(s=>{
    const a=0.2+Math.sin(t*1.5+s.twinkle)*0.3;
    ctx.globalAlpha=a;
    ctx.fillStyle=s.color;
    if(s.size>2){
      // Cross shape for bigger stars
      const sz=s.size;
      ctx.fillRect(s.x-sz/2,s.y-0.5,sz,1);
      ctx.fillRect(s.x-0.5,s.y-sz/2,1,sz);
    } else {
      ctx.fillRect(s.x,s.y,s.size,s.size);
    }
  });
  ctx.globalAlpha=1;
}

function drawHUD() {
  // Score panel (top left)
  ctx.fillStyle='rgba(10,0,18,0.7)';
  ctx.fillRect(5,5,130,55);
  ctx.strokeStyle='#9b30ff';

  ctx.fillRect(W/2-40,5,80,20);

  ctx.strokeRect(W/2-40,5,80,20);
  ctx.fillStyle='#ff69b4';
  ctx.font='8px "Press Start 2P"';
  ctx.textAlign='center';
  ctx.fillText(`LV.${level}`,W/2,19);

  // XP bar
  const xpW=120;
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(W/2-xpW/2,28,xpW,6);
  ctx.fillStyle='#9b30ff';
  const fill=Math.min(1,xpBar/xpNeeded)*xpW;
  ctx.fillRect(W/2-xpW/2,28,fill,6);
  ctx.strokeStyle='#cc88ff';
  ctx.lineWidth=0.5;
  ctx.strokeRect(W/2-xpW/2,28,xpW,6);

  // Lives (top right)
  ctx.textAlign='right';
  for(let i=0;i<3;i++){
    ctx.fillStyle=i<lives?'#ff69b4':'#333';
    ctx.font='16px "Press Start 2P"';
    ctx.fillText('♥',W-10-i*24,22);
  }

  // Combo
  if(combo>=3){
    ctx.textAlign='center';
    const comboColor = combo>=20?'#FFD700':combo>=10?'#9b30ff':'#ff69b4';
    ctx.fillStyle=comboColor;
    ctx.font=`${combo>=10?14:11}px "Press Start 2P"`;
    const pulse = 1+Math.sin(Date.now()/100)*0.1;
    ctx.save();
    ctx.translate(W/2,52);
    ctx.scale(pulse,pulse);
    ctx.fillText(`${combo}x COMBO`,0,0);
    ctx.restore();

function drawPlayer() {
  ctx.save();
  const bob = Math.sin(player.bobTimer)*3;
  const spriteImg = images[player.sprite]||images.idle;
  const drawW=player.w, drawH=player.h;
  
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(player.x,H-88,35,8,0,0,Math.PI*2);
  ctx.fill();

  // Glow effect when on combo
  if(combo>=5){
    const glowColor = combo>=10?'rgba(155,48,255,':'rgba(255,105,180,';
    ctx.shadowColor=glowColor+'0.5)';
    ctx.shadowBlur=20+Math.sin(Date.now()/100)*10;
  }

  const py = player.y+bob;
  if(player.facing===-1){
    ctx.translate(player.x,py);
    ctx.scale(-1,1);
    ctx.drawImage(spriteImg,-drawW/2,-drawH/2,drawW,drawH);
  } else {
    ctx.drawImage(spriteImg,player.x-drawW/2,py-drawH/2,drawW,drawH);
  }
  ctx.shadowBlur=0;
  ctx.restore();
}

function drawPrey() {
  preyList.forEach(prey=>{
    if(!prey.alive)return;
    ctx.save();
    ctx.translate(prey.x,prey.y);
    ctx.rotate(prey.rot);
    
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(0,prey.type.h/2+5,prey.type.size/3,4,0,0,Math.PI*2);
    ctx.fill();
    
    // Sprite
    ctx.drawImage(prey.type.sprite,-prey.type.size/2,-prey.type.h/2,prey.type.size,prey.type.h);
    
    // Glow
    ctx.globalAlpha=0.3;
    ctx.shadowColor=prey.type.color;
    ctx.shadowBlur=8;
    ctx.drawImage(prey.type.sprite,-prey.type.size/2,-prey.type.h/2,prey.type.size,prey.type.h);
    ctx.globalAlpha=1;
    ctx.shadowBlur=0;
    
    ctx.restore();
  });
}

function drawParticles() {
  particles.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=p.life;
    ctx.translate(p.x,p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle=p.color;
    if(p.type==='circle'){
      ctx.beginPath();ctx.arc(0,0,p.size/2,0,Math.PI*2);ctx.fill();
    } else {
      ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);
    }
    ctx.restore();
  });
}

function drawSparkles() {
  sparkles.forEach(s=>{
    ctx.globalAlpha=s.life;
    ctx.fillStyle=s.color;
    const sz=s.size;
    // Star shape
    ctx.fillRect(s.x-sz/2,s.y-1,sz,2);
    ctx.fillRect(s.x-1,s.y-sz/2,2,sz);
    // Diagonal
    ctx.fillRect(s.x-sz/3,s.y-sz/3,sz/3*2,1);
  });
  ctx.globalAlpha=1;
}

function drawFloatingTexts() {
  floatingTexts.forEach(t=>{
    ctx.save();
    ctx.globalAlpha=t.life;
    ctx.fillStyle=t.color;
    ctx.font=`${t.size}px "Press Start 2P"`;
    ctx.textAlign='center';
    ctx.translate(t.x,t.y);
    ctx.scale(t.scale,t.scale);
    // Outline
    ctx.strokeStyle='rgba(0,0,0,0.8)';
    ctx.lineWidth=3;
    ctx.strokeText(t.text,0,0);
    ctx.fillText(t.text,0,0);
    ctx.restore();
  });
}

function drawLootPopup() {
  if(!lootPopup.active)return;
  ctx.save();
  ctx.translate(lootPopup.x,lootPopup.y);
  const s=lootPopup.scale;
  ctx.scale(s,s);
  ctx.font='16px "Press Start 2P"';
  ctx.textAlign='center';
  ctx.strokeStyle='rgba(0,0,0,0.9)';
  ctx.lineWidth=4;
  ctx.strokeText(lootPopup.text,0,0);
  ctx.fillStyle='#FFD700';
  ctx.fillText(lootPopup.text,0,0);
  ctx.restore();
}

function drawFlash() {
  if(flashAlpha<=0)return;
  ctx.fillStyle=flashColor;
  ctx.globalAlpha=flashAlpha;
  ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=1;
}

// ==================== SCREENS ====================
function drawTitle() {
  // Background
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0a0012');bg.addColorStop(0.6,'#1a0a2e');bg.addColorStop(1,'#0d2818');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  drawStars();
  drawPixelForest();
  drawGround();

  // Title panel
  ctx.fillStyle='rgba(10,0,18,0.85)';
  ctx.fillRect(30,130,W-60,360);
  ctx.strokeStyle='#9b30ff';
  ctx.lineWidth=2;
  ctx.strokeRect(30,130,W-60,360);
  ctx.strokeStyle='#ff69b4';
  ctx.strokeRect(33,133,W-66,354);

  // Title
  ctx.textAlign='center';
  ctx.fillStyle='#ff69b4';
  ctx.font='18px "Press Start 2P"';
  ctx.fillText("KELEBEK'S",W/2,180);
  ctx.fillStyle='#FFD700';
  ctx.font='30px "Press Start 2P"';
  ctx.fillText('HUNT',W/2,220);
  
  // Sprite
  if(images.proud) ctx.drawImage(images.proud,W/2-55,235,110,133);

  // Prey info
  ctx.font='10px "Press Start 2P"';
  ctx.fillStyle='#cc88ff';
  ctx.fillText('CATCH PREY:',W/2,395);
  
  // Draw prey with names
  const previewY=420;
  ctx.drawImage(birdSprite,W/2-100,previewY-10,33,27);
  ctx.fillStyle='#FFD700';ctx.font='8px "Press Start 2P"';
  ctx.fillText('+10',W/2-83,previewY+25);
  
  ctx.drawImage(bugSprite,W/2-14,previewY-8,27,24);
  ctx.fillStyle='#88ff44';
  ctx.fillText('+20',W/2,previewY+25);
  
  ctx.drawImage(lizardSprite,W/2+55,previewY-10,48,27);
  ctx.fillStyle='#44ffaa';
  ctx.fillText('+30',W/2+80,previewY+25);

  // Instructions
  ctx.fillStyle='#8866aa';
  ctx.font='8px "Press Start 2P"';
  ctx.fillText('Miss 3 and game over!',W/2,462);

  // Start blink
  if(Math.floor(Date.now()/500)%2){
    ctx.fillStyle='#ff69b4';
    ctx.font='14px "Press Start 2P"';
    ctx.fillText('TAP TO START',W/2,560);
  }

  // High score
  if(highScore>0){
    ctx.fillStyle='#FFD700';ctx.font='9px "Press Start 2P"';
    ctx.fillText(`BEST: ${highScore}`,W/2,590);
  }

  // Brand
  ctx.fillStyle='#9b30ff';ctx.font='12px "Press Start 2P"';
  ctx.fillText('adopt.exe',W/2,H-25);
}

function drawCountdown() {
  drawGame();
  ctx.fillStyle='rgba(10,0,18,0.7)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  
  if(countdownNum>0){
    ctx.fillStyle='#ff69b4';
    ctx.font='60px "Press Start 2P"';
    const scale = 1+Math.sin(countdownTimer%40/40*Math.PI)*0.3;
    ctx.save();
    ctx.translate(W/2,H/2);
    ctx.scale(scale,scale);
    ctx.fillText(`${countdownNum}`,0,20);
    ctx.restore();
  } else {
    ctx.fillStyle='#FFD700';
    ctx.font='36px "Press Start 2P"';
    ctx.fillText('HUNT!',W/2,H/2+15);
  }
}

function drawGameOver() {
  ctx.fillStyle='rgba(10,0,18,0.9)';
  ctx.fillRect(0,0,W,H);

  // Panel
  ctx.fillStyle='rgba(20,5,35,0.95)';
  ctx.fillRect(30,100,W-60,500);
  ctx.strokeStyle='#ff69b4';ctx.lineWidth=2;
  ctx.strokeRect(30,100,W-60,500);
  ctx.strokeStyle='#9b30ff';
  ctx.strokeRect(33,103,W-66,494);

  ctx.textAlign='center';
  
  // Game Over
  ctx.fillStyle='#ff69b4';ctx.font='22px "Press Start 2P"';
  ctx.fillText('GAME OVER',W/2,155);

  // Score
  ctx.fillStyle='#cc88ff';ctx.font='10px "Press Start 2P"';
  ctx.fillText('FINAL SCORE',W/2,200);
  ctx.fillStyle='#FFD700';ctx.font='32px "Press Start 2P"';
  ctx.fillText(`${score}`,W/2,245);

  if(score>=highScore&&score>0){
    ctx.fillStyle='#ff69b4';ctx.font='10px "Press Start 2P"';
    if(Math.floor(Date.now()/300)%2) ctx.fillText('★ NEW RECORD ★',W/2,270);
  }

  // Stats
  ctx.fillStyle='#8866aa';ctx.font='9px "Press Start 2P"';
  ctx.fillText(`LEVEL: ${level}`,W/2,310);
  ctx.fillText(`MAX COMBO: ${maxCombo}`,W/2,335);

  // Kelebek
  if(images.proud) ctx.drawImage(images.proud,W/2-45,355,90,110);

  // CTA box
  ctx.fillStyle='rgba(68,255,68,0.1)';
  ctx.fillRect(50,480,W-100,50);
  ctx.strokeStyle='#44ff44';
  ctx.strokeRect(50,480,W-100,50);
  ctx.fillStyle='#44ff44';ctx.font='10px "Press Start 2P"';
  ctx.fillText('KELEBEK',W/2,502);
  ctx.fillStyle='#88cc88';ctx.font='8px "Press Start 2P"';
  ctx.fillText('DM @adopt.exe_',W/2,520);

  // Retry
  if(Math.floor(Date.now()/500)%2){
    ctx.fillStyle='#ff69b4';ctx.font='12px "Press Start 2P"';
    ctx.fillText('TAP TO RETRY',W/2,570);
  }

  ctx.fillStyle='#9b30ff';ctx.font='11px "Press Start 2P"';
  ctx.fillText('adopt.exe',W/2,H-25);
}

function drawGame() {
  // Background
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#050010');bg.addColorStop(0.5,'#120828');bg.addColorStop(0.85,'#0d1a12');bg.addColorStop(1,'#1a3a1a');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  drawStars();
  drawPixelForest();
  drawGround();
  drawPrey();
  drawPlayer();
  drawParticles();
  drawSparkles();
  drawFloatingTexts();
  drawLootPopup();
  drawFlash();
  drawHUD();
}

// ==================== LOOP ====================
function gameLoop() {
  update();
  ctx.save();
  if(shakeTime>0) ctx.translate((Math.random()-0.5)*shakeX*2,(Math.random()-0.5)*shakeY*2);
  
  switch(state){
    case 'title': drawTitle(); break;
    case 'countdown': drawCountdown(); break;
    case 'playing': drawGame(); break;
    case 'gameover': drawGame(); drawGameOver(); break;
  }
  ctx.restore();
  requestAnimationFrame(gameLoop);
}

function startGame(){ gameLoop(); }
</script>
</body>
